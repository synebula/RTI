<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Remote Text Input Pair</title>
  <style>
    :root {
      --bg: #f2efe7;
      --card: rgba(255,255,255,.86);
      --ink: #162126;
      --muted: #5d6a6d;
      --accent: #0f766e;
      --border: rgba(22,33,38,.12);
      --shadow: 0 24px 60px rgba(22,33,38,.12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Noto Sans SC", "Noto Sans", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(15,118,110,.16), transparent 30%),
        radial-gradient(circle at bottom right, rgba(220,107,47,.14), transparent 25%),
        linear-gradient(180deg, #faf7f0, var(--bg));
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .shell {
      width: min(100%, 920px);
      display: grid;
      grid-template-columns: minmax(280px, 360px) 1fr;
      gap: 20px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 22px;
    }
    .panel {
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 18px;
      background: rgba(255,255,255,.74);
    }
    h1, h2 {
      margin: 0 0 10px;
    }
    .muted {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }
    .qr {
      display: grid;
      place-items: center;
      min-height: 320px;
      background: white;
      border-radius: 20px;
      padding: 16px;
    }
    .qr svg {
      width: min(100%, 300px);
      height: auto;
    }
    .fallback {
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
    }
    .links {
      display: grid;
      gap: 14px;
      margin-top: 16px;
    }
    .link-card {
      display: grid;
      gap: 6px;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: rgba(22,33,38,.04);
    }
    .label {
      font-size: .92rem;
      color: var(--muted);
    }
    .url {
      color: var(--accent);
      text-decoration: none;
      word-break: break-all;
      font-weight: 700;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 18px;
    }
    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      padding: 12px 18px;
      font-weight: 700;
      text-decoration: none;
      background: var(--accent);
      color: white;
    }
    .ghost {
      background: rgba(22,33,38,.08);
      color: var(--ink);
    }
    @media (max-width: 820px) {
      .shell {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="panel">
      <h1>扫码打开手机输入页</h1>
      <p class="muted">手机连上同一局域网后，直接扫码即可打开远程输入页。这个页面适合在 Linux 桌面上常驻显示。</p>
      <div class="qr" id="qrcode"></div>
    </section>
    <script src="/qrcode.min.js"></script>
    <script>
      new QRCode(document.getElementById("qrcode"), {
        text: "{{.PhoneURL}}",
        width: 260,
        height: 260,
        colorDark : "#162126",
        colorLight : "#ffffff",
        correctLevel : QRCode.CorrectLevel.M
      });
    </script>
    <section class="panel">
      <h2>访问方式</h2>
      <div class="links">
        <div class="link-card">
          <span class="label">Phone URL</span>
          <a class="url" href="{{.PhoneURL}}">{{.PhoneURL}}</a>
        </div>
        <div class="link-card">
          <span class="label">Local URL</span>
          <a class="url" href="{{.LocalURL}}">{{.LocalURL}}</a>
        </div>
      </div>
      <div class="actions">
        <a class="button" href="{{.LocalURL}}">在本机打开输入页</a>
        <a class="button ghost" href="{{.PhoneURL}}">在当前浏览器打开手机页链接</a>
      </div>
      <p class="muted" style="margin-top:18px;">如果扫码后没有打开，请确认手机和 Linux 在同一网络，并且使用本次启动打印出来的最新 token。</p>
    </section>
  </main>
</body>
</html>
