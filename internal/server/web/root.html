<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Remote Text Input</title>
    <style>
      :root {
        --bg: #f3eee2;
        --card: rgba(255, 255, 255, 0.82);
        --panel: rgba(255, 255, 255, 0.72);
        --ink: #17232b;
        --muted: #5f6f77;
        --accent: #0f766e;
        --accent-2: #d96c2f;
        --accent-3: #18344a;
        --border: rgba(23, 35, 43, 0.1);
        --shadow: 0 24px 60px rgba(23, 35, 43, 0.14);
        --shadow-soft: 0 10px 24px rgba(23, 35, 43, 0.08);
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Noto Sans SC", "Noto Sans", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(
            circle at top left,
            rgba(15, 118, 110, 0.17),
            transparent 30%
          ),
          radial-gradient(
            circle at top right,
            rgba(217, 108, 47, 0.14),
            transparent 24%
          ),
          linear-gradient(180deg, #faf7ef, var(--bg));
        display: grid;
        place-items: center;
        padding: 18px;
      }
      .shell {
        width: min(100%, 760px);
        background: var(--card);
        backdrop-filter: blur(12px);
        border: 1px solid var(--border);
        border-radius: 28px;
        box-shadow: var(--shadow);
        padding: 18px;
      }
      .hero {
        position: relative;
        overflow: hidden;
        border-radius: 24px;
        padding: 8px 12px;
        background: linear-gradient(
          145deg,
          rgba(15, 118, 110, 0.96),
          rgba(24, 52, 74, 0.94)
        );
        color: white;
        box-shadow: var(--shadow-soft);
      }
      .hero-grid {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .hero-copy {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }
      .hero::after {
        content: "";
        position: absolute;
        inset: auto -40px -60px auto;
        width: 180px;
        height: 180px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.1);
        filter: blur(2px);
      }
      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 3px 8px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.14);
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.02em;
      }
      h1 {
        margin: 4px 0 2px;
        font-size: clamp(0.98rem, 2.2vw, 1.18rem);
        line-height: 1.15;
      }
      .hint {
        margin: 0;
        max-width: 20rem;
        color: rgba(255, 255, 255, 0.86);
        font-size: 0.76rem;
        line-height: 1.35;
      }
      .steps {
        display: flex;
        gap: 6px;
        margin: 0;
      }
      .step {
        flex: 1;
        min-width: 0;
        border-radius: 12px;
        padding: 5px 10px;
        background: rgba(255, 255, 255, 0.12);
        text-align: center;
      }
      .step strong {
        display: block;
        margin-bottom: 1px;
        font-size: 0.7rem;
      }
      .step span {
        display: block;
        font-size: 0.66rem;
        color: rgba(255, 255, 255, 0.78);
      }
      .hero-copy {
        min-width: 0;
      }
      .hero-steps {
        min-width: 0;
      }
      .editor-card {
        margin-top: 16px;
        border-radius: 24px;
        border: 1px solid var(--border);
        background: var(--panel);
        padding: 14px;
      }
      .toolbar {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-top: 12px;
      }
      .toolbar-row {
        display: grid;
        gap: 10px;
      }
      .toolbar-row.primary {
        grid-template-columns: 1fr 1fr;
      }
      .toolbar-row.secondary {
        grid-template-columns: 1fr 1fr 1fr;
      }
      button {
        appearance: none;
        border: 0;
        border-radius: 18px;
        min-height: 52px;
        padding: 12px 14px;
        font: inherit;
        font-weight: 800;
        cursor: pointer;
        transition:
          transform 0.08s ease,
          opacity 0.2s ease,
          box-shadow 0.2s ease;
        box-shadow: var(--shadow-soft);
      }
      button:active {
        transform: translateY(1px) scale(0.99);
      }
      .primary {
        background: linear-gradient(135deg, var(--accent), #14968b);
        color: white;
      }
      .secondary {
        background: linear-gradient(135deg, var(--accent-2), #f08a4b);
        color: white;
      }
      .ghost {
        background: rgba(23, 35, 43, 0.06);
        color: var(--ink);
      }
      .subtle {
        background: white;
        color: var(--accent-3);
      }
      .button-label {
        display: block;
        font-size: 0.98rem;
        line-height: 1.1;
      }
      .button-note {
        display: block;
        margin-top: 4px;
        font-size: 0.75rem;
        font-weight: 600;
        opacity: 0.78;
      }
      textarea {
        width: 100%;
        min-height: 220px;
        resize: vertical;
        border-radius: 22px;
        border: 1px solid var(--border);
        padding: 18px;
        font: inherit;
        font-size: 1.02rem;
        line-height: 1.65;
        background: rgba(255, 255, 255, 0.96);
        color: var(--ink);
        outline: none;
      }
      textarea:focus {
        border-color: rgba(15, 118, 110, 0.45);
        box-shadow: 0 0 0 4px rgba(15, 118, 110, 0.12);
      }
      .footer {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 14px;
        margin-top: 12px;
        flex-wrap: wrap;
      }
      .footnote {
        margin: 0;
        color: var(--muted);
        line-height: 1.55;
        font-size: 0.92rem;
      }
      .status {
        min-height: 1.5em;
        margin: 0;
        color: var(--muted);
        font-size: 0.92rem;
        text-align: right;
      }
      code {
        background: rgba(255, 255, 255, 0.16);
        padding: 2px 6px;
        border-radius: 8px;
      }
      @media (max-width: 720px) {
        body {
          padding: 12px;
        }
        .shell {
          padding: 12px;
          border-radius: 24px;
        }
        .hero {
          padding: 14px;
        }
        .steps {
          grid-template-columns: 1fr;
        }
        .toolbar-row.primary-row {
          grid-template-columns: 1fr 1fr;
        }
        .toolbar-row.secondary-row {
          grid-template-columns: 1fr 1fr 1fr;
        }
        textarea {
          min-height: 220px;
        }
        .footer {
          flex-direction: column;
        }
        .status {
          text-align: left;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div class="hero-grid">
          <div class="hero-copy">
            <span class="eyebrow">RTI</span>
            <h1>Remote Text Input</h1>
            <p class="hint">远程文本输入</p>
          </div>
          <div class="hero-steps">
            <div class="steps">
              <div class="step">
                <strong>聚焦</strong>
                <span>目标输入框</span>
              </div>
              <div class="step">
                <strong>输入</strong>
                <span>Android 键盘</span>
              </div>
              <div class="step">
                <strong>发送</strong>
                <span>文本或回车</span>
              </div>
            </div>
          </div>
        </div>
      </section>
      <section class="editor-card">
        <textarea
          id="editor"
          autofocus
          placeholder="在这里输入中文、英文，或者多行文本。发送前不用手动复制。"
        ></textarea>
        <div class="toolbar">
          <div class="toolbar-row primary-row">
            <button class="secondary" id="sendTextEnter">
              <span class="button-label">发送文本回车</span>
              <span class="button-note">普通模式 · Ctrl+V</span>
            </button>
            <button class="primary" id="sendText">
              <span class="button-label">发送文本</span>
              <span class="button-note">终端模式 · Ctrl+Shift+V</span>
            </button>
          </div>
          <div class="toolbar-row secondary-row">
            <button class="subtle" id="sendEnter">
              <span class="button-label">回车</span>
              <span class="button-note">只发回车</span>
            </button>
            <button class="subtle" id="restoreLast">
              <span class="button-label">恢复</span>
              <span class="button-note">恢复内容</span>
            </button>
            <button class="ghost" id="clearText">
              <span class="button-label">清空</span>
              <span class="button-note">清空内容</span>
            </button>
          </div>
        </div>
        <div class="footer">
          <p class="status" id="status">已连接。请先聚焦 Linux 目标输入框。</p>
        </div>
      </section>
    </main>
    <script>
      const token =
        new URLSearchParams(window.location.search).get("token") || "";
      const editor = document.getElementById("editor");
      const status = document.getElementById("status");
      const STORAGE_KEY = "rti-last-sent";

      async function flushComposition() {
        editor.blur();
        await new Promise((resolve) => setTimeout(resolve, 40));
      }

      async function call(path, payload) {
        const res = await fetch(path, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "X-Auth-Token": token,
          },
          body: JSON.stringify(payload || {}),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          throw new Error(data.error || "HTTP " + res.status);
        }
        return data;
      }

      function setStatus(message, isError = false) {
        status.textContent = message;
        status.style.color = isError ? "#b42318" : "var(--muted)";
      }

      async function sendText(withEnter, inputMode) {
        await flushComposition();
        const text = editor.value;
        if (!text.trim() && !text.includes("\n")) {
          setStatus("先输入一点内容再发送。", true);
          return;
        }
        try {
          setStatus("正在发送文本...");
          const result = await call("/api/commit", {
            text,
            enter: withEnter,
            inputMode: inputMode,
          });
          localStorage.setItem(STORAGE_KEY, text);
          editor.value = "";
          setStatus(
            withEnter
              ? result.mode === "terminal-pasted"
                ? "已用 Ctrl+Shift+V 粘贴并回车。"
                : "已粘贴文本并回车。"
              : result.mode === "terminal-pasted"
                ? "已用 Ctrl+Shift+V 粘贴。"
                : "已粘贴文本。",
          );
          editor.focus();
        } catch (err) {
          setStatus("发送失败：" + err.message, true);
        }
      }

      async function sendEnter() {
        try {
          setStatus("正在发送回车...");
          await call("/api/enter");
          setStatus("已发送回车。");
        } catch (err) {
          setStatus("发送失败：" + err.message, true);
        }
      }

      function restoreLast() {
        const last = localStorage.getItem(STORAGE_KEY);
        if (last) {
          editor.value = last;
          editor.focus();
          setStatus("已恢复上次发送的内容。");
        } else {
          setStatus("没有可恢复的内容。", true);
        }
      }

      document
        .getElementById("sendText")
        .addEventListener("click", () => sendText(false, "terminal"));
      document
        .getElementById("sendTextEnter")
        .addEventListener("click", () => sendText(true, "paste"));
      document.getElementById("sendEnter").addEventListener("click", sendEnter);
      document.getElementById("clearText").addEventListener("click", () => {
        editor.value = "";
        editor.focus();
        setStatus("已清空。");
      });
      document
        .getElementById("restoreLast")
        .addEventListener("click", restoreLast);

      window.addEventListener("pageshow", () =>
        setTimeout(() => editor.focus(), 60),
      );
      window.addEventListener("focus", () =>
        setTimeout(() => editor.focus(), 60),
      );
      editor.focus();
    </script>
  </body>
</html>
